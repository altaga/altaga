name: Generate GitHub Stats

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create stats directory
        run: mkdir -p stats

      - name: Clone and setup github-readme-stats
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git temp-stats
          cd temp-stats
          npm install --legacy-peer-deps

      - name: Generate GitHub Stats Card
        run: |
          cd temp-stats
          cat > generate.js << 'EOF'
          const http = require("http");
          const url = require("url");
          
          // Start the server
          const server = http.createServer(async (req, res) => {
            const query = url.parse(req.url, true).query;
            
            try {
              const renderStatsCard = require("./src/cards/stats-card.js").default;
              const stats = await renderStatsCard({
                username: "altaga",
                title_color: "2f80ed",
                text_color: "434d58",
                bg_color: "fffefe",
                hide_border: false,
                cache_seconds: 14400,
                locale: "en",
                disable_animations: false,
              });
              
              res.writeHead(200, { "Content-Type": "image/svg+xml" });
              res.end(stats);
            } catch (err) {
              console.error(err);
              res.writeHead(500);
              res.end("Error");
            }
          });
          
          server.listen(3000);
          EOF
          
          node generate.js &
          sleep 2
          curl -s "http://localhost:3000/?username=altaga" -o ../stats/github-stats.svg

      - name: Generate Top Languages Card
        run: |
          cd temp-stats
          cat > generate-langs.js << 'EOF'
          const http = require("http");
          const url = require("url");
          
          const server = http.createServer(async (req, res) => {
            const query = url.parse(req.url, true).query;
            
            try {
              const renderTopLanguages = require("./src/cards/top-languages-card.js").default;
              const langs = await renderTopLanguages({
                username: "altaga",
                title_color: "2f80ed",
                text_color: "434d58",
                bg_color: "fffefe",
                hide_border: false,
                cache_seconds: 14400,
                layout: "compact",
              });
              
              res.writeHead(200, { "Content-Type": "image/svg+xml" });
              res.end(langs);
            } catch (err) {
              console.error(err);
              res.writeHead(500);
              res.end("Error");
            }
          });
          
          server.listen(3001);
          EOF
          
          node generate-langs.js &
          sleep 2
          curl -s "http://localhost:3001/?username=altaga" -o ../stats/top-languages.svg

      - name: Cleanup
        run: rm -rf temp-stats

      - name: Verify files
        run: |
          echo "=== SVG Files Created ==="
          ls -lh stats/
          echo ""
          echo "=== Checking SVG validity ==="
          file stats/github-stats.svg
          file stats/top-languages.svg

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commit changes
        run: |
          git add stats/
          git diff --cached --quiet || git commit -m "📊 Update GitHub stats"

      - name: Push changes
        run: |
          git pull --no-edit origin master || true
          git push origin master