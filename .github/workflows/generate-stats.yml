name: Generate GitHub Stats

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create stats directory
        run: mkdir -p stats

      - name: Generate stats using jstrieb/github-stats
        run: |
          npm install -g github-readme-stats-cli
          
          # Generate GitHub stats
          github-readme-stats \
            --username altaga \
            --theme default \
            --layout compact \
            --show-icons \
            > stats/github-stats.svg
          
          # Generate top languages
          github-readme-stats \
            --username altaga \
            --theme default \
            --layout compact \
            --type languages \
            > stats/top-languages.svg

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add stats/
            git commit -m "📊 Update GitHub stats"
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: Pull and push
        run: |
          git pull --no-edit origin master
          git push origin master