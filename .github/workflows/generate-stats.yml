name: Generate GitHub Stats

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create stats directory
        run: mkdir -p stats

      - name: Generate stats using anuraghazra's action
        uses: anuraghazra/github-readme-stats@master
        with:
          username: altaga
          output_path: stats
          theme: default
          layout: compact
          show_icons: true

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit changes
        run: |
          git add stats/
          git diff --cached --quiet || git commit -m "📊 Update stats"

      - name: Push changes
        run: |
          git pull --no-edit origin master || true
          git push origin master