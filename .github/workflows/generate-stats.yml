name: Generate GitHub Stats

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create stats directory
        run: mkdir -p stats

      - name: Download GitHub Stats (with retry)
        run: |
          for i in {1..5}; do
            echo "Attempt $i..."
            curl -s -L \
              "https://github-readme-stats.vercel.app/api?username=altaga&theme=default&layout=compact&show_icons=true&cache_seconds=3600" \
              -o stats/github-stats.svg
            
            if grep -q "<svg" stats/github-stats.svg 2>/dev/null; then
              echo "✅ GitHub stats downloaded successfully"
              break
            else
              echo "⚠️ Attempt $i failed, retrying..."
              sleep $((i * 5))
            fi
          done

      - name: Download Top Languages (with retry)
        run: |
          for i in {1..5}; do
            echo "Attempt $i..."
            curl -s -L \
              "https://github-readme-stats.vercel.app/api/top-langs/?username=altaga&theme=default&layout=compact&cache_seconds=3600" \
              -o stats/top-languages.svg
            
            if grep -q "<svg" stats/top-languages.svg 2>/dev/null; then
              echo "✅ Top languages downloaded successfully"
              break
            else
              echo "⚠️ Attempt $i failed, retrying..."
              sleep $((i * 5))
            fi
          done

      - name: Verify files were created
        run: |
          if [ -f stats/github-stats.svg ] && [ -f stats/top-languages.svg ]; then
            echo "✅ Both SVG files created"
            ls -lh stats/
          else
            echo "❌ Files not created"
            exit 1
          fi

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add stats/
            git commit -m "📊 Update GitHub stats"
            echo "✅ Changes committed"
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: Pull and push
        run: |
          git pull --no-edit origin master || true
          git push origin master || echo "Nothing to push"