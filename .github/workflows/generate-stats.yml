name: Generate GitHub Stats

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create stats directory
        run: mkdir -p stats

      - name: Generate GitHub Stats SVG
        run: |
          curl -L "https://github-readme-stats.vercel.app/api?username=altaga&theme=default&layout=compact&show_icons=true" \
            -o stats/github-stats.svg

      - name: Generate Top Languages SVG
        run: |
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=altaga&theme=default&layout=compact" \
            -o stats/top-languages.svg

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Check for changes and commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add stats/
            git commit -m "📊 Update GitHub stats"
          else
            echo "No changes to commit"
          fi

      - name: Pull latest changes
        run: git pull --no-edit origin master

      - name: Push changes
        run: git push origin master